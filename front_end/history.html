<!DOCTYPE html>
<html>
<head>
<title>Prediction History</title>
</head>

<body>

<h1>Prediction History</h1>

<table border="1">

<tr>
<th>ID</th>
<th>Image</th>
<th>Disease</th>
<th>Confidence</th>
<th>Date</th>
</tr>

{% for row in data %}

<tr>

<td>{{row[0]}}</td>

<td>
<img src="{{row[1]}}" width="100">
</td>

<td>{{row[2]}}</td>

<td>{{row[3]}}</td>

<td>{{row[4]}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
